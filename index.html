const fmt=n=>new Intl.NumberFormat("es-EC",{style:"currency",currency:"USD",minimumFractionDigits:2}).format(n||0);
const fmtD=d=>{if(!d)return"";const[y,m,day]=d.split("-");return`${day}/${m}/${y}`;};

function printBajasReport(bajas,rangoLabel){
  const total=bajas.reduce((s,b)=>s+(b.precio||0)*(b.cantidad||0),0);
  const rows=bajas.map(b=>`
    <tr>
      <td>${b.fecha_baja?new Date(b.fecha_baja).toLocaleString("es-EC"):(b.fecha||"—")}</td>

      <td>${(b.descripcion||"—").replace(/</g,"&lt;")}</td>
      <td style="text-align:center">${b.cantidad}</td>
      <td style="text-align:right">${fmt(b.precio)}</td>
      <td style="text-align:right">${fmt((b.precio||0)*(b.cantidad||0))}</td>
      <td>${(b.motivo||"").replace(/</g,"&lt;")}</td>
    </tr>`).join("");
  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Reporte de Bajas</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:30px;color:#1a1a1a;}
    h1{font-size:20px;margin-bottom:2px;}
    .sub{color:#666;font-size:12px;margin-bottom:4px;}
    .range{color:#333;font-size:12px;margin-bottom:20px;font-weight:600;}
    table{width:100%;border-collapse:collapse;font-size:12px;}
    th,td{border:1px solid #ccc;padding:6px 8px;text-align:left;}
    th{background:#f2f2f2;}

    @media print{ body{padding:10px;} }
  </style></head>
  <body>
    <h1>Reporte de Bajas de Inventario</h1>
    <div class="sub">Generado el ${fmtDateTime()} · ${bajas.length} registro${bajas.length!==1?"s":""}</div>
    ${rangoLabel?`<div class="range">Rango: ${rangoLabel}</div>`:""}
    <table>
      <thead><tr><th>Fecha de baja</th><th>Equipo</th><th>Descripción</th><th>Cant.</th><th>Precio unit.</th><th>Subtotal</th><th>Motivo</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td colspan="5" style="text-align:right">Total estimado en bajas:</td><td style="text-align:right">${fmt(total)}</td><td></td></tr></tfoot>
    </table>
  </body></html>`;
  const w=window.open("","_blank");

/* ── Tabla de bajas con filtro de rango de fechas ── */
function BajasTabla({bajas,setModal}){
  const [desde,setDesde]=useState("");
  const [hasta,setHasta]=useState("");

  const filtradas=React.useMemo(()=>{
    if(!desde&&!hasta) return bajas;
    return bajas.filter(b=>{
      const f=b.fecha_baja?new Date(b.fecha_baja):(b.fecha?new Date(b.fecha):null);
      if(!f) return true;
      const fStr=f.toISOString().slice(0,10);
      if(desde&&fStr<desde) return false;
      if(hasta&&fStr>hasta) return false;
      return true;
    });
  },[bajas,desde,hasta]);

  const rangoLabel=(desde||hasta)?`${desde?fmtD(desde):"inicio"} → ${hasta?fmtD(hasta):"hoy"}`:null;

  return <>
    <div className="card" style={{padding:14,marginBottom:14,display:"flex",gap:12,alignItems:"flex-end",flexWrap:"wrap"}}>
      <div>
        <label className="label">Desde</label>
        <input type="date" className="input" value={desde} onChange={e=>setDesde(e.target.value)}/>
      </div>
      <div>
        <label className="label">Hasta</label>
        <input type="date" className="input" value={hasta} onChange={e=>setHasta(e.target.value)}/>
      </div>
      {(desde||hasta)&&<button className="btn btn-ghost btn-sm" onClick={()=>{setDesde("");setHasta("");}}>✕ Limpiar filtro</button>}
      <div style={{marginLeft:"auto",display:"flex",gap:10,alignItems:"center"}}>
        <span style={{fontSize:12,color:"var(--text2)"}}>{filtradas.length} de {bajas.length} registro{bajas.length!==1?"s":""}</span>
        <button className="btn btn-ghost btn-sm" disabled={filtradas.length===0} onClick={()=>printBajasReport(filtradas,rangoLabel)}>🖨️ Imprimir reporte</button>
      </div>
    </div>

    {filtradas.length===0&&<div className="card" style={{padding:30,textAlign:"center",color:"var(--text3)"}}>
      No hay registros en el rango seleccionado.
    </div>}

    {filtradas.length>0&&<div className="card table-wrap">
      <table>
        <thead><tr>
          <th>Fecha de baja</th>
          <th>Equipo</th>
          <th>Descripción</th>
          <th style={{textAlign:"center"}}>Cantidad</th>
          <th>Precio unit.</th>
          <th>Motivo / Descripción</th>
          <th style={{textAlign:"center"}}>Acciones</th>
        </tr></thead>
        <tbody>
          {filtradas.map(b=>(
            <tr key={b.id}>
              <td style={{whiteSpace:"nowrap",fontSize:12,color:"var(--text2)"}}>{b.fecha_baja?new Date(b.fecha_baja).toLocaleString("es-EC"):b.fecha||"—"}</td>
              <td style={{fontWeight:600}}>{b.nombre}</td>
              <td style={{color:"var(--text2)",maxWidth:180}}>{b.descripcion||"—"}</td>
              <td style={{textAlign:"center",fontWeight:700}}>{b.cantidad}</td>
              <td style={{color:"var(--accent)",fontWeight:600,whiteSpace:"nowrap"}}>{fmt(b.precio)}</td>
              <td style={{color:"var(--text2)",maxWidth:220}}>{b.motivo}</td>
              <td style={{textAlign:"center",whiteSpace:"nowrap"}}>
                <button className="btn btn-ghost btn-sm" style={{padding:"4px 8px"}} title="Editar" onClick={()=>setModal({type:"editBaja",data:b})}>✏️</button>
                <button className="btn btn-ghost btn-sm" style={{padding:"4px 8px",color:"#dc2626"}} title="Eliminar" onClick={()=>setModal({type:"delBaja",data:b})}>🗑️</button>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>}
  </>;
}

function NumInput({value,onChange,min=0,max,className="input",style={}}){
  const [local,setLocal]=useState(String(value??0));
  useEffect(()=>{setLocal(String(value??0));},[value]);
  return <input
    type="number" inputMode="numeric"
    className={className} style={style}
    value={local} min={min} max={max}
    onChange={e=>{
      const v=e.target.value;setLocal(v);
      const n=parseFloat(v);
      if(!isNaN(n)) onChange(max!==undefined?Math.min(n,max):n);
    }}
    onBlur={()=>{
      const n=parseFloat(local);
      const safe=isNaN(n)?0:Math.max(min,max!==undefined?Math.min(n,max):n);
      setLocal(String(safe));onChange(safe);
    }}
  />;
}

const ESTATUS_OPTS=["activo","inactivo","baja"];

function EstatusBadge({estatus}){
  if(!estatus||estatus==="activo") return <span className="badge badge-ok">✓ Activo</span>;
  if(estatus==="inactivo") return <span className="badge badge-inactivo">⏸ Inactivo</span>;
  if(estatus==="baja") return <span className="badge badge-baja">✕ Baja</span>;
  return <span className="badge badge-inactivo">{estatus}</span>;
}

  const [dark,setDark]=useState(()=>localStorage.getItem("theme")==="dark");
  /* ── nuevos estados ── */
  const [showDelete,setShowDelete]=useState(true);         // toggle botón borrar
  const [bajas,setBajas]=useState([]);                      // historial de bajas (Supabase)
  const [archivoEventos,setArchivoEventos]=useState([]);   // archivo de eventos pasados

  useEffect(()=>{
    document.documentElement.setAttribute("data-theme",dark?"dark":"light");
    localStorage.setItem("theme",dark?"dark":"light");
  },[dark]);

  const showToast=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};

  const loadAll=useCallback(async()=>{
    setLoading(true);
    try{
      const [inv,evs,eq,bajasDB,archDB]=await Promise.all([api.getInventario(),api.getEventos(),api.getEeqs(),api.getBajas(),api.getArchivoEventos()]);
      setInventory(inv||[]);setEvents(evs||[]);setEeqs(eq||[]);
      setBajas(bajasDB||[]);setArchivoEventos(archDB||[]);
    }catch(e){showToast("Error al cargar: "+e.message,"err");}
    setLoading(false);
  },[]);

  useEffect(()=>{loadAll();},[]);

  const saveItem=async(item)=>{
    setSaving(true);
    try{
      const{id,created_at,...data}=item;
      if(id){
        const anterior=inventory.find(i=>i.id===id);
        const diff=(anterior?.cantidad||0)-(data.cantidad||0);
        // Si se redujo la cantidad, registrar baja parcial
        if(diff>0){
          await api.registrarBaja({
            nombre:data.nombre||anterior?.nombre||"Desconocido",
            descripcion:data.descripcion||anterior?.descripcion||"",
            cantidad:diff,
            precio:data.precio||anterior?.precio||0,
            motivo:`Baja parcial por edición de inventario (cantidad reducida de ${anterior?.cantidad} a ${data.cantidad})`
          });
        }
        await api.updateItem(id,data);
        showToast(diff>0?`Equipo actualizado · ${diff} unidad${diff!==1?"es":""} registrada${diff!==1?"s":""} en bajas`:"Equipo actualizado");
      }else{
        await api.createItem(data);showToast("Equipo creado");
      }
      await loadAll();setModal(null);
    }catch(e){showToast("Error: "+e.message,"err");}
    setSaving(false);
  };

  /* ── eliminar con registro de baja en Supabase ── */
  const deleteItem=async(id,descripcionBaja)=>{
    setSaving(true);
    try{
      const item=inventory.find(i=>i.id===id);
      // Registrar baja en Supabase ANTES de eliminar
      await api.registrarBaja({
        nombre:item?.nombre||"Desconocido",
        descripcion:item?.descripcion||"",
        cantidad:item?.cantidad||0,
        precio:item?.precio||item?.valor||0,
        motivo:descripcionBaja||"Sin descripción"
      });
      await api.deleteItem(id);
      showToast("Equipo dado de baja y registrado en historial");
      await loadAll();setModal(null);
    }catch(e){showToast("Error: "+e.message,"err");}
    setSaving(false);
  };

  const saveEvent=async(ev)=>{
    setSaving(true);
    try{
      const{id,created_at,...data}=ev;
      if(id){await api.updateEvento(id,data);showToast("Evento actualizado");}
      else{await api.createEvento(data);showToast("Evento creado");}
      await loadAll();setModal(null);
    }catch(e){showToast("Error: "+e.message,"err");}
    setSaving(false);
  };

  const deleteEvent=async(id)=>{
    setSaving(true);
    try{
      const ev=events.find(e=>e.id===id);
      const eqsEvento=getEvEqs(id).map(eq=>{
        const it=inventory.find(i=>i.id===eq.inventario_id);
        return {nombre:it?.nombre||"?",cantidad:eq.cantidad};
      });
      // Archivar evento ANTES de eliminar
      await api.archivarEvento({
        id:ev.id,
        nombre:ev.nombre,
        cliente:ev.cliente||null,
        lugar:ev.lugar||null,
        color:ev.color||null,
        fecha:ev.fecha,
        fecha_fin:ev.fecha_fin||ev.fecha,
        equipos:eqsEvento
      });
      await api.deleteEvento(id);
      showToast("Evento eliminado y archivado");await loadAll();setModal(null);
    }
    catch(e){showToast("Error: "+e.message,"err");}
    setSaving(false);
  };

  const saveEeqs=async(evId,eqs)=>{
    setSaving(true);
    try{await api.setEeqs(evId,eqs);showToast("Equipos guardados");await loadAll();setModal(null);}
    catch(e){showToast("Error: "+e.message,"err");}
    setSaving(false);
  };

  const updateBaja=async(id,data)=>{
    setSaving(true);
    try{await api.updateBaja(id,data);showToast("Registro de baja actualizado");await loadAll();setModal(null);}
    catch(e){showToast("Error: "+e.message,"err");}
    setSaving(false);
  };

  const deleteBaja=async(id)=>{
    setSaving(true);
    try{await api.deleteBaja(id);showToast("Registro eliminado del historial");await loadAll();setModal(null);}
    catch(e){showToast("Error: "+e.message,"err");}
    setSaving(false);
  };

  const deleteArchivoEvento=async(id)=>{
    setSaving(true);
    try{await api.deleteArchivoEvento(id);showToast("Evento eliminado del archivo");await loadAll();setModal(null);}
    catch(e){showToast("Error: "+e.message,"err");}
    setSaving(false);
  };

  const todayDate=new Date();todayDate.setHours(0,0,0,0);
  const isPast=ev=>{const fin=new Date(ev.fecha_fin||ev.fecha);fin.setHours(23,59,59,999);return fin<todayDate;};

  const activeEeqs=eeqs.filter(eq=>{const ev=events.find(e=>e.id===eq.evento_id);return ev&&!isPast(ev);});

  const getEvEqs=eid=>eeqs.filter(e=>e.evento_id===eid);
  const getEqEvs=iid=>events.filter(ev=>!isPast(ev)&&eeqs.some(e=>e.evento_id===ev.id&&e.inventario_id===iid));
  const getUsed=(iid,exEv=null)=>activeEeqs.filter(e=>e.inventario_id===iid&&e.evento_id!==exEv).reduce((s,e)=>s+e.cantidad,0);
  const getMant=iid=>{const it=inventory.find(i=>i.id===iid);return it?(it.cantidad_mantenimiento||0):0;};
  const getAvail=(iid,exEv=null)=>{const it=inventory.find(i=>i.id===iid);return it?Math.max(0,it.cantidad-getUsed(iid,exEv)-getMant(iid)):0;};

  /* ── valor total en bodega ── */
  const totalValorComercial=useMemo(()=>inventory.reduce((s,it)=>s+(it.valor||it.precio||0)*it.cantidad,0),[inventory]);

  /* ── items en mantenimiento ── */
  const itemsEnMant=useMemo(()=>inventory.filter(it=>(it.cantidad_mantenimiento||0)>0),[inventory]);

  /* ── imprimir reporte de mantenimiento ── */
  const printMantReport=()=>{
    const rows=itemsEnMant.map(it=>`<tr>
      <td>${it.nombre}</td>
      <td>${it.descripcion||""}</td>
      <td style="text-align:center">${it.cantidad}</td>
      <td style="text-align:center;color:#d97706;font-weight:700">${it.cantidad_mantenimiento}</td>
      <td style="text-align:center;color:#16a34a;font-weight:700">${Math.max(0,it.cantidad-(it.cantidad_mantenimiento||0))}</td>
      <td>${it.dueno||"—"}</td>
    </tr>`).join("");
    const win=window.open("","_blank");
    win.document.write(`<!DOCTYPE html><html><head><title>Reporte de Mantenimiento</title>
    <style>body{font-family:'Segoe UI',sans-serif;padding:32px;color:#111;max-width:960px;margin:0 auto}
    h1{font-size:22px;margin-bottom:4px}
    .meta{color:#555;font-size:13px;margin-bottom:20px}
    table{width:100%;border-collapse:collapse}
    th{background:#111;color:#fff;padding:10px 14px;text-align:left;font-size:12px;text-transform:uppercase}
    td{padding:9px 14px;border-bottom:1px solid #eee;font-size:13px}
    tr:nth-child(even) td{background:#fffbf0}
    .noprint{margin-bottom:16px}
    @media print{.noprint{display:none}}
    </style></head><body>
    <button class="noprint" onclick="window.print()" style="padding:8px 18px;background:#111;color:#fff;border:none;border-radius:6px;cursor:pointer;margin-bottom:16px">🖨 Imprimir</button>
    <h1>🔧 Reporte de Elementos en Mantenimiento</h1>
    <div class="meta">Generado el ${fmtDateTime()} · Total de equipos en mantenimiento: <strong>${itemsEnMant.length}</strong></div>
    <table><thead><tr>
      <th>Equipo</th><th>Descripción</th><th style="text-align:center">Total</th>
      <th style="text-align:center">🔧 Mant.</th><th style="text-align:center">✓ Libre</th><th>Dueño</th>
    </tr></thead><tbody>
    ${rows||"<tr><td colspan='6' style='text-align:center;color:#aaa;padding:20px'>Sin equipos en mantenimiento</td></tr>"}
    </tbody></table></body></html>`);
    win.document.close();
  };

  const getDIM=(y,m)=>new Date(y,m+1,0).getDate();
  const getFD=(y,m)=>new Date(y,m,1).getDay();
  const getEvDay=day=>{
    const d=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    return events.filter(ev=>d>=ev.fecha&&d<=(ev.fecha_fin||ev.fecha));
  };

  /* ── imprimir evento con columna Regreso ── */
  const printEvent=ev=>{
    const eqs=getEvEqs(ev.id);
    const rows=eqs.map(eq=>{
      const it=inventory.find(i=>i.id===eq.inventario_id);
      return it?`<tr>
        <td>${it.nombre}</td>
        <td>${it.descripcion||""}</td>
        <td style="text-align:center">${eq.cantidad}</td>
        <td style="text-align:center"><input type="checkbox" style="width:16px;height:16px;cursor:pointer"/></td>
        <td style="text-align:center"><input type="checkbox" style="width:16px;height:16px;cursor:pointer"/></td>
      </tr>`:"";
    }).join("");
    const win=window.open("","_blank");
    win.document.write(`<!DOCTYPE html><html><head><title>${ev.nombre}</title>
    <style>body{font-family:'Segoe UI',sans-serif;padding:32px;color:#111;max-width:900px;margin:0 auto}
    h1{font-size:24px;margin-bottom:4px}
    .meta{color:#555;margin-bottom:20px;font-size:13px;line-height:2}
    table{width:100%;border-collapse:collapse}
    th{background:#111;color:#fff;padding:10px 14px;text-align:left;font-size:12px;text-transform:uppercase}
    td{padding:9px 14px;border-bottom:1px solid #eee;font-size:13px}
    tr:nth-child(even) td{background:#f9f9ff}
    .dot{display:inline-block;width:10px;height:10px;border-radius:2px;background:${ev.color};margin-right:6px;vertical-align:middle}
    @media print{.noprint{display:none}}
    </style></head><body>
    <button class="noprint" onclick="window.print()" style="margin-bottom:16px;padding:8px 18px;background:#111;color:#fff;border:none;border-radius:6px;cursor:pointer">🖨 Imprimir</button>
    <h1><span class="dot"></span>${ev.nombre}</h1>
    <div class="meta"><b>Cliente:</b> ${ev.cliente||"—"}<br><b>Lugar:</b> ${ev.lugar||"—"}<br>
    <b>Fecha:</b> ${fmtD(ev.fecha)}${ev.fecha_fin&&ev.fecha_fin!==ev.fecha?` al ${fmtD(ev.fecha_fin)}`:""}</div>
    <table><thead><tr>
      <th>Equipo</th><th>Descripción</th>
      <th style="text-align:center">Cant.</th>
      <th style="text-align:center">✓ Salida</th>
      <th style="text-align:center">↩ Regreso</th>
    </tr></thead>
    <tbody>${rows||"<tr><td colspan='5' style='text-align:center;color:#aaa;padding:20px'>Sin equipos asignados</td></tr>"}</tbody>
    </table></body></html>`);
    win.document.close();
  };

  const filtInv=useMemo(()=>inventory.filter(it=>{
    const ms=it.nombre?.toLowerCase().includes(search.toLowerCase())||it.descripcion?.toLowerCase().includes(search.toLowerCase());
    let me=true;
    if(filterEstado==="mantenimiento") me=(it.cantidad_mantenimiento||0)>0;
    else if(filterEstado==="disponible") me=getAvail(it.id)>0;
    else if(filterEstado==="no-disponible") me=getAvail(it.id)===0;
    let ms2=true;
    if(filterEstatus!=="todos") ms2=(it.estatus||"activo")===filterEstatus;
    return ms&&me&&ms2;
  }),[inventory,eeqs,events,search,filterEstado,filterEstatus]);

  if(loading) return(
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{width:40,height:40,border:"3px solid var(--border)",borderTop:"3px solid #6d28d9",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
      <div style={{color:"var(--text2)",fontFamily:"'DM Sans',sans-serif"}}>Conectando con Supabase...</div>
    </div>
  );

  return <div>
    {toast&&<div style={{position:"fixed",bottom:24,right:16,zIndex:999,padding:"12px 18px",borderRadius:10,background:toast.type==="err"?"#7f1d1d":"#14532d",color:"#fff",fontSize:14,fontWeight:600,animation:"toastin .3s ease",border:`1px solid ${toast.type==="err"?"#ef4444":"#22c55e"}`,maxWidth:"calc(100vw - 32px)"}}>{toast.type==="err"?"❌ ":"✓ "}{toast.msg}</div>}

    <div className="header">
      <div className="header-title">⚡ Inventario Evano</div>
      <div className="nav-wrap">
        {[
          {id:"inventario",icon:"📦",label:"Inventario"},
          {id:"eventos",icon:"🎪",label:"Eventos"},
          {id:"calendario",icon:"📅",label:"Calendario"},
          {id:"ubicacion",icon:"🔍",label:"Ubicación"},
          {id:"bajas",icon:"🗂️",label:"Historial Bajas"},
          {id:"archivo",icon:"📁",label:"Archivo Eventos"}
        ].map(v=>(
          <button key={v.id} className={`nav-btn ${view===v.id?"active":""}`} onClick={()=>setView(v.id)}>{v.icon} {v.label}</button>
        ))}
      </div>
      <button className="btn btn-ghost btn-sm" onClick={loadAll} title="Sincronizar" style={{flexShrink:0}}>↻</button>
      <button className="btn btn-ghost btn-sm" onClick={()=>setDark(d=>!d)} style={{flexShrink:0,fontSize:15,padding:"6px 10px"}}>{dark?"☀️":"🌙"}</button>
    </div>

    <div className="page">

      {/* ===== INVENTARIO ===== */}
      {view==="inventario"&&<div>
        <div className="sec-hdr">
          <div>
            <h2 style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:22,fontWeight:700}}>Inventario General</h2>
            <p style={{color:"var(--text2)",fontSize:13,marginTop:2}}>{inventory.length} equipos registrados</p>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            {/* Botón toggle icono borrar */}
            <button
              className={`btn btn-sm ${showDelete?"btn-warning":"btn-ghost"}`}
              onClick={()=>setShowDelete(d=>!d)}
              title={showDelete?"Ocultar botones eliminar":"Mostrar botones eliminar"}
            >
              {showDelete?"🔒 Ocultar borrar":"🔓 Mostrar borrar"}
            </button>
            <button className="btn btn-primary" onClick={()=>setModal({type:"item",data:null})}>+ Nuevo Equipo</button>
          </div>
        </div>

        {/* Banner valor total comercial */}
        <div className="total-banner">
          <div>
            <div style={{fontSize:12,opacity:.8,marginBottom:2,fontWeight:600,letterSpacing:".05em",textTransform:"uppercase"}}>Valor total comercial en bodega</div>
            <div style={{fontSize:26,fontWeight:700,fontFamily:"'Space Grotesk',sans-serif"}}>{fmt(totalValorComercial)}</div>
          </div>
          <div style={{fontSize:32,opacity:.7}}>💰</div>
        </div>

        {/* Banner mantenimiento si hay items */}
        {itemsEnMant.length>0&&<div style={{background:"#fef9c3",border:"1px solid #fde047",borderRadius:12,padding:"12px 18px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <span style={{fontSize:22}}>🔧</span>
            <div>
              <div style={{fontWeight:700,color:"#92400e",fontSize:14}}>{itemsEnMant.length} equipo{itemsEnMant.length!==1?"s":""} en mantenimiento</div>
              <div style={{fontSize:12,color:"#b45309",marginTop:2,display:"flex",gap:8,flexWrap:"wrap"}}>
                {itemsEnMant.map(it=>(
                  <span key={it.id} className="mant-icon">🔧 {it.nombre} ({it.cantidad_mantenimiento})</span>
                ))}
              </div>
            </div>
          </div>
          <button className="btn btn-sm" style={{background:"#f59e0b",color:"#fff",border:"none",flexShrink:0}} onClick={printMantReport}>
            🖨️ Imprimir reporte mant.
          </button>
        </div>}

        <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
          <input className="input" style={{flex:"1 1 200px"}} placeholder="🔎 Buscar equipo..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <select className="input" style={{flex:"0 1 180px"}} value={filterEstado} onChange={e=>setFilterEstado(e.target.value)}>
            <option value="todos">Todos los estados</option>
            <option value="disponible">Disponible</option>
            <option value="mantenimiento">Con mantenimiento</option>
            <option value="no-disponible">Sin stock</option>
          </select>
          <select className="input" style={{flex:"0 1 160px"}} value={filterEstatus} onChange={e=>setFilterEstatus(e.target.value)}>
            <option value="todos">Todos los estatus</option>
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
            <option value="baja">Baja</option>
          </select>
        </div>

        <div className="card table-wrap">
          <table>
            <thead><tr>
              <th>Equipo</th><th>Descripción</th><th>Precio</th>
              <th style={{textAlign:"center"}}>Total</th>
              <th style={{textAlign:"center"}}>🔧 Mant.</th>
              <th style={{textAlign:"center"}}>🎪 Eventos</th>
              <th style={{textAlign:"center"}}>✓ Libre</th>
              <th>Adquisición</th>
              <th>Estatus</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr></thead>
            <tbody>
              {filtInv.map(item=>{
                const avail=getAvail(item.id);
                const used=getUsed(item.id);
                const mant=item.cantidad_mantenimiento||0;
                const inEvs=getEqEvs(item.id);
                return <tr key={item.id}>
                  <td>
                    <div style={{fontWeight:600,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                      {item.nombre}
                      {/* Icono mantenimiento en línea */}
                      {mant>0&&<span className="mant-icon" title={`${mant} unidad(es) en mantenimiento`}>🔧 {mant}</span>}
                    </div>
                    {inEvs.length>0&&<div style={{marginTop:3}}>{inEvs.map(ev=><span key={ev.id} className="tag" style={{background:ev.color+"22",color:ev.color,border:`1px solid ${ev.color}44`}}>{ev.nombre}</span>)}</div>}
                  </td>
                  <td style={{color:"var(--text2)",maxWidth:160}}>{item.descripcion}{item.dueno&&<div style={{fontSize:11,color:"var(--accent)",marginTop:2}}>👤 {item.dueno}</div>}</td>
                  <td style={{color:"var(--accent)",fontWeight:600,whiteSpace:"nowrap"}}>{fmt(item.precio)}</td>
                  <td style={{textAlign:"center",fontWeight:700}}>{item.cantidad}</td>
                  <td style={{textAlign:"center"}}>{mant>0?<span style={{color:"#f59e0b",fontWeight:700}}>{mant}</span>:<span style={{color:"var(--text3)"}}>—</span>}</td>
                  <td style={{textAlign:"center"}}>{used>0?<span style={{color:"#7c3aed",fontWeight:700}}>{used}</span>:<span style={{color:"var(--text3)"}}>—</span>}</td>
                  <td style={{textAlign:"center"}}><span style={{color:avail===0?"#f87171":avail<item.cantidad*0.3?"#f59e0b":"#16a34a",fontWeight:700}}>{avail}</span></td>
                  <td style={{color:"var(--text2)",whiteSpace:"nowrap",fontSize:12}}>{item.fecha_adquisicion?fmtD(item.fecha_adquisicion):<span style={{color:"var(--text3)"}}>—</span>}</td>
                  <td><EstatusBadge estatus={item.estatus}/></td>
                  <td>{(()=>{
                    if(avail===0) return <span className="badge badge-no">✕ Sin stock</span>;
                    if(mant>0) return <span className="badge badge-mant">🔧 Parcial mant.</span>;
                    return <span className="badge badge-ok">✓ Disponible</span>;
                  })()}</td>
                  <td>
                    <div style={{display:"flex",gap:5,flexWrap:"nowrap"}}>
                      <button className="btn btn-ghost btn-sm" onClick={()=>setModal({type:"item",data:item})} title="Editar / mantenimiento" style={{minWidth:52}}>🔧 {mant}</button>
                      <button className="btn btn-ghost btn-sm" onClick={()=>setModal({type:"item",data:item})}>✏️</button>
                      {showDelete&&<button className="btn btn-danger btn-sm" onClick={()=>setModal({type:"delItem",data:item})}>🗑</button>}
                    </div>
                  </td>
                </tr>;
              })}
            </tbody>
          </table>
          {filtInv.length===0&&<div style={{textAlign:"center",padding:40,color:"var(--text3)"}}>No se encontraron equipos</div>}
        </div>
      </div>}

      {/* ===== EVENTOS ===== */}
      {view==="eventos"&&<div>
        <div className="sec-hdr">
          <div>
            <h2 style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:22,fontWeight:700}}>Eventos</h2>
            <p style={{color:"var(--text2)",fontSize:13,marginTop:2}}>Crea eventos y asigna equipos del inventario</p>
          </div>
          <button className="btn btn-primary" onClick={()=>setModal({type:"event",data:null})}>+ Nuevo Evento</button>
        </div>
        <div className="ev-grid">
          {events.map(ev=>{
            const eqs=getEvEqs(ev.id);
            const totalVal=eqs.reduce((s,eq)=>{const it=inventory.find(i=>i.id===eq.inventario_id);return s+(it?it.precio*eq.cantidad:0);},0);
            const past=isPast(ev);
            return <div key={ev.id} className="card" style={{padding:18,borderLeft:`4px solid ${ev.color}`,opacity:past?.65:1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                <div style={{minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                    <div style={{fontWeight:700,fontSize:15}}>{ev.nombre}</div>
                    {past&&<span style={{fontSize:10,fontWeight:700,background:"var(--bg3)",color:"var(--text3)",padding:"1px 7px",borderRadius:20,border:"1px solid var(--border)"}}>FINALIZADO</span>}
                  </div>
                  <div style={{color:"var(--text2)",fontSize:13,marginTop:2}}>{ev.cliente}</div>
                </div>
                <div style={{display:"flex",gap:5,flexShrink:0}}>
                  <button className="btn btn-ghost btn-sm" onClick={()=>printEvent(ev)} title="Imprimir">🖨️</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setModal({type:"eeqs",data:ev})} title="Equipos">📦</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setModal({type:"event",data:ev})}>✏️</button>
                  <button className="btn btn-danger btn-sm" onClick={()=>setModal({type:"delEvent",data:ev})}>🗑</button>
                </div>
              </div>
              <div style={{marginTop:10,display:"flex",gap:14,fontSize:12,color:"var(--text2)",flexWrap:"wrap"}}>
                <span>📅 {fmtD(ev.fecha)}{ev.fecha_fin&&ev.fecha_fin!==ev.fecha?` → ${fmtD(ev.fecha_fin)}`:""}</span>
                <span>📍 {ev.lugar}</span>
              </div>
              <div className="sep"/>
              <div style={{fontSize:13}}>
                <div style={{color:"var(--text2)",marginBottom:6}}>Equipos ({eqs.length})</div>
                {eqs.length===0&&<div style={{color:"var(--text3)",fontStyle:"italic"}}>Sin equipos asignados</div>}
                {eqs.slice(0,3).map(eq=>{const it=inventory.find(i=>i.id===eq.inventario_id);return it?<div key={eq.id} style={{display:"flex",justifyContent:"space-between",marginBottom:3,color:"var(--text)"}}><span>{it.nombre}</span><span style={{color:"var(--accent)",fontWeight:600}}>x{eq.cantidad}</span></div>:null;})}
                {eqs.length>3&&<div style={{color:"var(--text3)",fontSize:12}}>+{eqs.length-3} más...</div>}
              </div>
              <div className="sep"/>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12,color:"var(--text2)"}}>Valor estimado</span>
                <span style={{fontWeight:700,color:"var(--accent)"}}>{fmt(totalVal)}</span>
              </div>
            </div>;
          })}
          {events.length===0&&<div style={{color:"var(--text3)",padding:40}}>No hay eventos creados aún</div>}
        </div>
      </div>}

      {/* ===== CALENDARIO ===== */}
      {view==="calendario"&&<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
          <h2 style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:22,fontWeight:700}}>Calendario</h2>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <button className="btn btn-ghost btn-sm" onClick={()=>{let m=calMonth-1,y=calYear;if(m<0){m=11;y--;}setCalMonth(m);setCalYear(y);}}>‹</button>
            <span style={{fontWeight:600,minWidth:130,textAlign:"center",fontSize:14}}>{MONTHS[calMonth]} {calYear}</span>
            <button className="btn btn-ghost btn-sm" onClick={()=>{let m=calMonth+1,y=calYear;if(m>11){m=0;y++;}setCalMonth(m);setCalYear(y);}}>›</button>
          </div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
          {events.map(ev=><div key={ev.id} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"var(--text2)"}}><div style={{width:9,height:9,borderRadius:2,background:ev.color,flexShrink:0}}/><span style={{whiteSpace:"nowrap"}}>{ev.nombre}</span></div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:3}}>
          {DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:11,fontWeight:600,color:"var(--text3)",padding:"4px 0"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
          {Array(getFD(calYear,calMonth)).fill(null).map((_,i)=><div key={`e${i}`} style={{border:"1px solid var(--border2)",borderRadius:5,minHeight:64,opacity:.2,background:"var(--cal-day)"}}/>)}
          {Array(getDIM(calYear,calMonth)).fill(null).map((_,i)=>{
            const day=i+1;const dayEvs=getEvDay(day);
            const td=new Date();const isToday=td.getFullYear()===calYear&&td.getMonth()===calMonth&&td.getDate()===day;
            return <div key={day} className={`cal-day ${isToday?"today":""} ${dayEvs.length>0?"has-ev":""}`}>
              <div style={{fontSize:11,fontWeight:isToday?700:400,color:isToday?"#7c3aed":"var(--text2)",marginBottom:2}}>{day}</div>
              {dayEvs.map(ev=><div key={ev.id} className="cal-pill" style={{background:ev.color+"33",color:ev.color,border:`1px solid ${ev.color}55`}} title={ev.nombre}>{ev.nombre}</div>)}
              {dayEvs.length>1&&<div style={{fontSize:9,color:"#7c3aed",fontWeight:700}}>⚡ x{dayEvs.length}</div>}
            </div>;
          })}
        </div>
      </div>}

      {/* ===== UBICACIÓN ===== */}
      {view==="ubicacion"&&<div>
        <div style={{marginBottom:16}}>
          <h2 style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:22,fontWeight:700}}>Ubicación de Equipos</h2>
          <p style={{color:"var(--text2)",fontSize:13,marginTop:2}}>Dónde está cada equipo del inventario</p>
        </div>
        <div className="ubic-grid">
          {inventory.map(item=>{
            const evWithItem=getEqEvs(item.id);const used=getUsed(item.id);const mant=item.cantidad_mantenimiento||0;const avail=item.cantidad-(used+mant);
            return <div key={item.id} className="card" style={{padding:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div>
                  <div style={{fontWeight:700,fontSize:14,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                    {item.nombre}
                    {mant>0&&<span className="mant-icon">🔧 {mant}</span>}
                  </div>
                  <div style={{fontSize:12,color:"var(--text2)",marginTop:1}}>{item.descripcion}</div>
                  {item.fecha_adquisicion&&<div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>📅 Adq: {fmtD(item.fecha_adquisicion)}</div>}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end"}}>
                  <EstatusBadge estatus={item.estatus}/>
                </div>
              </div>
              <div style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--text2)",marginBottom:5,flexWrap:"wrap",gap:6}}>
                  <span>📦 <strong>{item.cantidad}</strong></span>
                  {mant>0&&<span style={{color:"#f59e0b"}}>🔧 <strong>{mant}</strong></span>}
                  <span style={{color:"#7c3aed"}}>🎪 <strong>{used}</strong></span>
                  <span style={{color:avail<=0?"#f87171":"#16a34a"}}>✓ <strong>{Math.max(0,avail)}</strong></span>
                </div>
                <div style={{height:7,background:"var(--border2)",borderRadius:4,overflow:"hidden",display:"flex"}}>
                  <div style={{height:"100%",width:`${item.cantidad?(Math.max(0,avail)/item.cantidad)*100:0}%`,background:"#16a34a",transition:"width .3s"}}/>
                  <div style={{height:"100%",width:`${item.cantidad?(used/item.cantidad)*100:0}%`,background:"#7c3aed",transition:"width .3s"}}/>
                  <div style={{height:"100%",width:`${item.cantidad?(mant/item.cantidad)*100:0}%`,background:"#f59e0b",transition:"width .3s"}}/>
                </div>
              </div>
              {evWithItem.length===0?<div style={{fontSize:13,color:"var(--text3)",fontStyle:"italic"}}>No asignado a ningún evento</div>
              :evWithItem.map(ev=>{
                const eq=eeqs.find(e=>e.evento_id===ev.id&&e.inventario_id===item.id);
                return <div key={ev.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 9px",borderRadius:6,background:ev.color+"15",border:`1px solid ${ev.color}33`,marginBottom:3}}>
                  <div><div style={{fontSize:12,color:ev.color,fontWeight:600}}>{ev.nombre}</div><div style={{fontSize:11,color:"var(--text2)"}}>{fmtD(ev.fecha)} · {ev.lugar}</div></div>
                  <span style={{fontWeight:700,color:ev.color,flexShrink:0}}>x{eq?.cantidad}</span>
                </div>;
              })}
            </div>;
          })}
        </div>
      </div>}

      {/* ===== HISTORIAL DE BAJAS ===== */}
      {view==="bajas"&&<div>
        <div className="sec-hdr">
          <div>
            <h2 style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:22,fontWeight:700}}>🗂️ Historial de Bajas</h2>
            <p style={{color:"var(--text2)",fontSize:13,marginTop:2}}>{bajas.length} equipo{bajas.length!==1?"s":""} dado{bajas.length!==1?"s":""} de baja · guardado en Supabase</p>
          </div>
        </div>

        {bajas.length>0&&<BajasTabla bajas={bajas} setModal={setModal}/>}

        {bajas.length===0&&<div className="card" style={{padding:40,textAlign:"center",color:"var(--text3)"}}>
          <div style={{fontSize:36,marginBottom:12}}>📋</div>
          <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>Sin registros de bajas</div>
          <div style={{fontSize:13}}>Cuando des de baja un equipo del inventario, quedará registrado aquí permanentemente.</div>
        </div>}
      </div>}

      {/* ===== ARCHIVO DE EVENTOS ===== */}
      {view==="archivo"&&<div>
        <div className="sec-hdr">
          <div>
            <h2 style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:22,fontWeight:700}}>📁 Archivo de Eventos</h2>
            <p style={{color:"var(--text2)",fontSize:13,marginTop:2}}>{archivoEventos.length} evento{archivoEventos.length!==1?"s":""} archivado{archivoEventos.length!==1?"s":""} · guardado en Supabase</p>
          </div>
        </div>
        {archivoEventos.length===0&&<div className="card" style={{padding:40,textAlign:"center",color:"var(--text3)"}}>
          <div style={{fontSize:36,marginBottom:12}}>📁</div>
          <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>Sin eventos archivados</div>
          <div style={{fontSize:13}}>Cuando elimines un evento, quedará archivado aquí con todos sus equipos.</div>
        </div>}
        {archivoEventos.length>0&&<div className="ev-grid">
          {archivoEventos.map(ev=>(
            <div key={ev.id} className="card" style={{padding:18,borderLeft:`4px solid ${ev.color||"#999"}`,opacity:.85,position:"relative"}}>
              <button
                className="btn btn-ghost btn-sm"
                style={{position:"absolute",top:10,right:10,padding:"4px 8px",color:"#dc2626",zIndex:2}}
                title="Eliminar del archivo"
                onClick={(e)=>{e.stopPropagation();setModal({type:"delArchivo",data:ev});}}
              >🗑️</button>
              <div style={{cursor:"pointer"}} onClick={()=>setModal({type:"archivoDetalle",data:ev})}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                  <div style={{minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                      <div style={{fontWeight:700,fontSize:15}}>{ev.nombre}</div>
                      <span style={{fontSize:10,fontWeight:700,background:"var(--bg3)",color:"var(--text3)",padding:"1px 7px",borderRadius:20,border:"1px solid var(--border)"}}>ARCHIVADO</span>
                    </div>
                    <div style={{color:"var(--text2)",fontSize:13,marginTop:2}}>{ev.cliente||"—"}</div>
                  </div>
                </div>
                <div style={{marginTop:10,display:"flex",gap:14,fontSize:12,color:"var(--text2)",flexWrap:"wrap"}}>
                  <span>📅 {fmtD(ev.fecha)}{ev.fecha_fin&&ev.fecha_fin!==ev.fecha?` → ${fmtD(ev.fecha_fin)}`:""}</span>
                  {ev.lugar&&<span>📍 {ev.lugar}</span>}
                </div>
                <div className="sep"/>
                <div style={{fontSize:13}}>
                  <div style={{color:"var(--text2)",marginBottom:6}}>Equipos ({(ev.equipos||[]).length})</div>
                  {(!ev.equipos||ev.equipos.length===0)&&<div style={{color:"var(--text3)",fontStyle:"italic"}}>Sin equipos registrados</div>}
                  {(ev.equipos||[]).slice(0,4).map((eq,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",marginBottom:3,color:"var(--text)"}}><span>{eq.nombre}</span><span style={{color:"var(--accent)",fontWeight:600}}>x{eq.cantidad}</span></div>
                  ))}
                  {(ev.equipos||[]).length>4&&<div style={{color:"var(--text3)",fontSize:12}}>+{ev.equipos.length-4} más...</div>}
                </div>
                {ev.archivado_en&&<div style={{marginTop:10,fontSize:11,color:"var(--text3)"}}>Archivado el {new Date(ev.archivado_en).toLocaleDateString("es-EC")}</div>}
                <div style={{marginTop:8,fontSize:11,color:"var(--accent)",fontWeight:600}}>Ver detalle →</div>
              </div>
            </div>
          ))}
        </div>}
      </div>}

    </div>

    {modal&&<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
      {modal.type==="item"&&<ItemModal item={modal.data} onSave={saveItem} onClose={()=>setModal(null)} saving={saving}/>}
      {modal.type==="delItem"&&<DeleteItemModal item={modal.data} onConfirm={(id,motivo)=>deleteItem(id,motivo)} onClose={()=>setModal(null)} saving={saving}/>}
      {modal.type==="event"&&<EventModal event={modal.data} onSave={saveEvent} onClose={()=>setModal(null)} saving={saving}/>}
      {modal.type==="delEvent"&&<ConfirmModal title="¿Eliminar evento?" msg={`Se eliminará "${modal.data.nombre}" y sus equipos asignados.`} onConfirm={()=>deleteEvent(modal.data.id)} onClose={()=>setModal(null)} saving={saving}/>}
      {modal.type==="eeqs"&&<EeqsModal event={modal.data} inventory={inventory} eeqs={eeqs} getAvail={getAvail} onSave={saveEeqs} onClose={()=>setModal(null)} saving={saving}/>}
      {modal.type==="archivoDetalle"&&<ArchivoDetalleModal ev={modal.data} onClose={()=>setModal(null)}/>}
      {modal.type==="editBaja"&&<EditBajaModal baja={modal.data} onSave={updateBaja} onClose={()=>setModal(null)} saving={saving}/>}
      {modal.type==="delBaja"&&<ConfirmModal title="¿Eliminar registro de baja?" msg={`Se eliminará permanentemente el registro de "${modal.data.nombre}" del historial de bajas.`} onConfirm={()=>deleteBaja(modal.data.id)} onClose={()=>setModal(null)} saving={saving}/>}
      {modal.type==="delArchivo"&&<ConfirmModal title="¿Eliminar evento del archivo?" msg={`Se eliminará permanentemente "${modal.data.nombre}" del archivo de eventos.`} onConfirm={()=>deleteArchivoEvento(modal.data.id)} onClose={()=>setModal(null)} saving={saving}/>}
    </div>}
  </div>;
}

function ConfirmModal({title,msg,onConfirm,onClose,saving}){
  return <div className="modal" style={{maxWidth:380}}>
    <h3 style={{fontFamily:"'Space Grotesk',sans-serif",marginBottom:10}}>{title}</h3>
    <p style={{color:"var(--text2)",marginBottom:20,fontSize:14,lineHeight:1.5}}>{msg}</p>
    <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
      <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
      <button className="btn btn-danger" disabled={saving} onClick={onConfirm}>{saving?"Eliminando...":"Eliminar"}</button>
    </div>
  </div>;
}

/* ── Modal detalle de evento archivado ── */

      <h3 style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:19}}>{ev.nombre}</h3>
      <span style={{fontSize:10,fontWeight:700,background:"var(--bg3)",color:"var(--text3)",padding:"2px 8px",borderRadius:20,border:"1px solid var(--border)",whiteSpace:"nowrap"}}>ARCHIVADO</span>
    </div>
    <p style={{color:"var(--text2)",fontSize:13,marginBottom:16}}>{ev.cliente||"Sin cliente registrado"}</p>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
      <div className="card" style={{padding:12}}>
        <div style={{fontSize:11,color:"var(--text3)",marginBottom:4}}>📅 Fecha del evento</div>
        <div style={{fontWeight:600,fontSize:14}}>{fmtD(ev.fecha)}{ev.fecha_fin&&ev.fecha_fin!==ev.fecha?` → ${fmtD(ev.fecha_fin)}`:""}</div>
      </div>
      <div className="card" style={{padding:12}}>
        <div style={{fontSize:11,color:"var(--text3)",marginBottom:4}}>📍 Lugar</div>
        <div style={{fontWeight:600,fontSize:14}}>{ev.lugar||"—"}</div>
      </div>
    </div>

    <div className="sep"/>

    <div style={{marginBottom:8,fontWeight:600,fontSize:14}}>Materiales enviados ({(ev.equipos||[]).length})</div>
    {(!ev.equipos||ev.equipos.length===0)&&<div style={{color:"var(--text3)",fontStyle:"italic",fontSize:13}}>Sin equipos registrados para este evento</div>}
    {(ev.equipos&&ev.equipos.length>0)&&<div className="card table-wrap" style={{marginBottom:16}}>
      <table>
        <thead><tr><th>Equipo</th><th style={{textAlign:"center"}}>Cantidad</th></tr></thead>
        <tbody>
          {ev.equipos.map((eq,i)=>(
            <tr key={i}><td>{eq.nombre}</td><td style={{textAlign:"center",fontWeight:700,color:"var(--accent)"}}>x{eq.cantidad}</td></tr>

      </table>

      <button className="btn btn-ghost" onClick={onClose}>Cerrar</button>

/* ── Modal editar registro de baja ── */
function EditBajaModal({baja,onSave,onClose,saving}){
  const [form,setForm]=useState({
    nombre:baja.nombre||"",
    descripcion:baja.descripcion||"",
    cantidad:baja.cantidad||0,
    precio:baja.precio||0,
    motivo:baja.motivo||""
  });
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  return <div className="modal" style={{maxWidth:440}}>
    <h3 style={{fontFamily:"'Space Grotesk',sans-serif",marginBottom:16}}>✏️ Editar registro de baja</h3>
    <div style={{display:"grid",gap:14}}>
      <div>
        <label className="label">Equipo</label>
        <input className="input" value={form.nombre} onChange={e=>set("nombre",e.target.value)}/>
      </div>
      <div>
        <label className="label">Descripción</label>
        <input className="input" value={form.descripcion} onChange={e=>set("descripcion",e.target.value)}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div>
          <label className="label">Cantidad</label>
          <input type="number" className="input" value={form.cantidad} onChange={e=>set("cantidad",Number(e.target.value))}/>
        </div>
        <div>
          <label className="label">Precio unit.</label>
          <input type="number" step="0.01" className="input" value={form.precio} onChange={e=>set("precio",Number(e.target.value))}/>
        </div>
      </div>
      <div>
        <label className="label">Motivo / Descripción de la baja</label>
        <textarea className="input" rows={3} value={form.motivo} onChange={e=>set("motivo",e.target.value)}/>
      </div>
    </div>
    <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:20}}>
      <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
      <button className="btn btn-primary" disabled={saving} onClick={()=>onSave(baja.id,form)}>{saving?"Guardando...":"Guardar cambios"}</button>
    </div>
  </div>;
}

/* ── Modal eliminar con campo de motivo ── */
function DeleteItemModal({item,onConfirm,onClose,saving}){
  const [motivo,setMotivo]=useState("");
  return <div className="modal" style={{maxWidth:420}}>
    <h3 style={{fontFamily:"'Space Grotesk',sans-serif",marginBottom:10}}>🗑 Dar de baja equipo</h3>
    <p style={{color:"var(--text2)",marginBottom:16,fontSize:14,lineHeight:1.5}}>
      Se eliminará <strong>"{item.nombre}"</strong> del inventario. Esta acción no se puede deshacer y quedará registrada en el historial de bajas.
    </p>
    <div style={{marginBottom:20}}>
      <label className="label">Motivo / Descripción de la baja *</label>
      <textarea
        className="input"
        rows={3}
        placeholder="Ej: Equipo dañado, obsoleto, vendido, perdido..."
        value={motivo}
        onChange={e=>setMotivo(e.target.value)}
        style={{resize:"vertical"}}
      />
    </div>
    <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
      <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
      <button className="btn btn-danger" disabled={saving||!motivo.trim()} onClick={()=>onConfirm(item.id,motivo.trim())}>
        {saving?"Eliminando...":"Dar de baja"}
      </button>
    </div>
  </div>;
}

function ItemModal({item,onSave,onClose,saving}){
  const [f,setF]=useState(item
    ?{...item,precio:String(item.precio||0),cantidad:String(item.cantidad||0),valor:String(item.valor||0),cantidad_mantenimiento:String(item.cantidad_mantenimiento||0),fecha_adquisicion:item.fecha_adquisicion||"",estatus:item.estatus||"activo"}
    :{nombre:"",descripcion:"",dueno:"",precio:"",cantidad:"",valor:"",cantidad_mantenimiento:"0",estado:"disponible",fecha_adquisicion:"",estatus:"activo"}
  );
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const cantTotal=parseFloat(f.cantidad)||0;
  const cantMant=Math.min(parseFloat(f.cantidad_mantenimiento)||0,cantTotal);
  const cantDisp=Math.max(0,cantTotal-cantMant);

  const handleSave=()=>{
    const data={
      nombre:f.nombre,descripcion:f.descripcion,dueno:f.dueno||null,estado:f.estado,
      precio:parseFloat(f.precio)||0,
      cantidad:parseFloat(f.cantidad)||0,
      valor:parseFloat(f.valor)||0,
      cantidad_mantenimiento:Math.min(parseFloat(f.cantidad_mantenimiento)||0,parseFloat(f.cantidad)||0),
      fecha_adquisicion:f.fecha_adquisicion||null,
      estatus:f.estatus||"activo"
    };
    if(item?.id) data.id=item.id;
    if(item?.created_at) data.created_at=item.created_at;
    onSave(data);
  };

  return <div className="modal">
    <h3 style={{fontFamily:"'Space Grotesk',sans-serif",marginBottom:18}}>{item?.id?"Editar Equipo":"Nuevo Equipo"}</h3>
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div><label className="label">Nombre *</label><input className="input" value={f.nombre} onChange={e=>s("nombre",e.target.value)} placeholder="Ej: Módulos de Pantalla LED"/></div>
      <div><label className="label">Dueño</label><input className="input" value={f.dueno||""} onChange={e=>s("dueno",e.target.value)} placeholder="Nombre del dueño (opcional)"/></div>
      <div><label className="label">Descripción</label><textarea className="input" rows={2} value={f.descripcion||""} onChange={e=>s("descripcion",e.target.value)} placeholder="Descripción técnica" style={{resize:"vertical"}}/></div>
      <div className="row2">
        <div><label className="label">Precio unitario ($)</label><input className="input" type="number" inputMode="decimal" value={f.precio} onChange={e=>s("precio",e.target.value)} placeholder="0.00"/></div>
        <div><label className="label">Valor comercial ($)</label><input className="input" type="number" inputMode="decimal" value={f.valor} onChange={e=>s("valor",e.target.value)} placeholder="0.00"/></div>
      </div>
      <div className="row2">
        <div>
          <label className="label">Cantidad total en bodega</label>
          <input className="input" type="number" inputMode="numeric" value={f.cantidad} onChange={e=>s("cantidad",e.target.value)} placeholder="0" min="0"/>
        </div>
        <div>
          <label className="label" style={{color:"#f59e0b"}}>🔧 En mantenimiento</label>
          <input className="input" type="number" inputMode="numeric" value={f.cantidad_mantenimiento} onChange={e=>s("cantidad_mantenimiento",e.target.value)} placeholder="0" min="0" max={cantTotal} style={{borderColor:(parseFloat(f.cantidad_mantenimiento)||0)>0?"#f59e0b":undefined}}/>
        </div>
      </div>
      <div className="row2">
        <div>
          <label className="label">📅 Fecha de adquisición</label>
          <input className="input" type="date" value={f.fecha_adquisicion||""} onChange={e=>s("fecha_adquisicion",e.target.value)}/>
        </div>
        <div>
          <label className="label">Estatus del equipo</label>
          <select className="input" value={f.estatus||"activo"} onChange={e=>s("estatus",e.target.value)}>
            <option value="activo">✓ Activo</option>
            <option value="inactivo">⏸ Inactivo</option>
            <option value="baja">✕ Baja</option>
          </select>
        </div>
      </div>

      {cantTotal>0&&<div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,padding:"12px 14px"}}>
        <div style={{fontSize:11,color:"var(--text2)",marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:".05em"}}>Resumen</div>
        <div style={{display:"flex",gap:16,flexWrap:"wrap",fontSize:13,marginBottom:10}}>
          <span>📦 Total: <strong>{cantTotal}</strong></span>
          <span style={{color:"#f59e0b"}}>🔧 Mant.: <strong>{cantMant}</strong></span>
          <span style={{color:cantDisp===0?"#f87171":"#16a34a"}}>✓ Disponibles: <strong>{cantDisp}</strong></span>
        </div>
        <div style={{height:8,background:"var(--border)",borderRadius:4,overflow:"hidden",display:"flex"}}>
          <div style={{height:"100%",width:`${cantTotal?(cantDisp/cantTotal)*100:0}%`,background:"#16a34a",transition:"width .3s"}}/>
          <div style={{height:"100%",width:`${cantTotal?(cantMant/cantTotal)*100:0}%`,background:"#f59e0b",transition:"width .3s"}}/>
        </div>
      </div>}

      <div><label className="label">Estado del equipo</label>
        <select className="input" value={f.estado} onChange={e=>s("estado",e.target.value)}>
          <option value="disponible">Activo</option>
          <option value="mantenimiento">Dado de baja</option>
        </select>
      </div>
    </div>
    <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:20}}>
      <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
      <button className="btn btn-primary" disabled={saving||!f.nombre} onClick={handleSave}>{saving?"Guardando...":"Guardar"}</button>
    </div>
  </div>;
}

const COLORS=["#e74c3c","#e67e22","#f1c40f","#2ecc71","#1abc9c","#3498db","#9b59b6","#e91e63"];

function EventModal({event,onSave,onClose,saving}){
  const [f,setF]=useState(event||{nombre:"",cliente:"",fecha:"",fecha_fin:"",lugar:"",color:"#3498db"});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  return <div className="modal">
    <h3 style={{fontFamily:"'Space Grotesk',sans-serif",marginBottom:18}}>{event?.id?"Editar Evento":"Nuevo Evento"}</h3>
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div><label className="label">Nombre del evento *</label><input className="input" value={f.nombre} onChange={e=>s("nombre",e.target.value)} placeholder="Nombre del evento"/></div>
      <div className="row2">
        <div><label className="label">Cliente</label><input className="input" value={f.cliente||""} onChange={e=>s("cliente",e.target.value)} placeholder="Nombre del cliente"/></div>
        <div><label className="label">Lugar</label><input className="input" value={f.lugar||""} onChange={e=>s("lugar",e.target.value)} placeholder="Ubicación"/></div>
      </div>
      <div className="row2">
        <div><label className="label">Fecha inicio *</label><input className="input" type="date" value={f.fecha} onChange={e=>s("fecha",e.target.value)}/></div>
        <div><label className="label">Fecha fin</label><input className="input" type="date" value={f.fecha_fin||""} onChange={e=>s("fecha_fin",e.target.value)}/></div>
      </div>
      <div><label className="label">Color del evento</label>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {COLORS.map(c=><button key={c} onClick={()=>s("color",c)} style={{width:30,height:30,borderRadius:"50%",background:c,border:f.color===c?"3px solid var(--text)":"3px solid transparent",cursor:"pointer",flexShrink:0}}/>)}
        </div>
      </div>
    </div>
    <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:20}}>
      <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
      <button className="btn btn-primary" disabled={saving||!f.nombre||!f.fecha} onClick={()=>onSave({...f,fecha_fin:f.fecha_fin||f.fecha})}>{saving?"Guardando...":"Guardar"}</button>
    </div>
  </div>;
}

function EeqsModal({event,inventory,eeqs,getAvail,onSave,onClose,saving}){
  const cur=eeqs.filter(e=>e.evento_id===event.id);
  const [equipos,setEquipos]=useState(cur.map(e=>({inventario_id:e.inventario_id,cantidad:e.cantidad})));
  const [filtro,setFiltro]=useState("");

  const getMax=iid=>getAvail(iid,event.id);
  const add=id=>{
    if(!id||equipos.find(e=>e.inventario_id===id)) return;
    if(getMax(id)<=0) return;
    setEquipos(p=>[...p,{inventario_id:id,cantidad:1}]);
    setFiltro("");
  };
  const updCant=(id,val)=>{
    const max=getMax(id);
    const q=Math.max(1,Math.min(val,max));
    setEquipos(p=>p.map(e=>e.inventario_id===id?{...e,cantidad:q}:e));
  };
  const rem=id=>setEquipos(p=>p.filter(e=>e.inventario_id!==id));

  const toAdd=inventory.filter(it=>!equipos.find(e=>e.inventario_id===it.id)&&getMax(it.id)>0);
  const toAddF=toAdd.filter(it=>it.nombre.toLowerCase().includes(filtro.toLowerCase())||(it.descripcion||"").toLowerCase().includes(filtro.toLowerCase()));
  const sinStock=inventory.filter(it=>!equipos.find(e=>e.inventario_id===it.id)&&getMax(it.id)===0);

  return <div className="modal">
    <h3 style={{fontFamily:"'Space Grotesk',sans-serif",marginBottom:4}}>Equipos del evento</h3>
    <p style={{color:"var(--text2)",fontSize:13,marginBottom:16}}>{event.nombre}</p>
    {equipos.length===0&&<div style={{color:"var(--text3)",fontSize:13,marginBottom:12,fontStyle:"italic"}}>Sin equipos asignados</div>}
    {equipos.map(eq=>{
      const item=inventory.find(i=>i.id===eq.inventario_id);if(!item)return null;
      const maxA=getMax(item.id);
      const isOver=eq.cantidad>maxA;
      return <div key={eq.inventario_id} style={{display:"flex",gap:10,alignItems:"center",marginBottom:8,padding:"10px 12px",background:"var(--item-bg)",borderRadius:8,border:`1px solid ${isOver?"#ef4444":"var(--item-border)"}`}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:600,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.nombre}</div>
          <div style={{fontSize:11,color:isOver?"#f87171":"var(--text2)"}}>
            {isOver?`⚠ Solo hay ${maxA} disponibles`:`Disponible: ${maxA} de ${item.cantidad}`}
          </div>
        </div>
        <NumInput value={eq.cantidad} onChange={v=>updCant(eq.inventario_id,v)} min={1} max={maxA} className="input input-num"/>
        <button className="btn btn-danger btn-sm" onClick={()=>rem(eq.inventario_id)} style={{flexShrink:0}}>✕</button>
      </div>;
    })}
    <div className="sep"/>
    <label className="label">Agregar equipo</label>
    <input className="input" style={{marginBottom:8}} placeholder="🔎 Buscar equipo disponible..." value={filtro} onChange={e=>setFiltro(e.target.value)}/>
    {filtro&&<div style={{background:"var(--sr-bg)",border:"1px solid var(--border)",borderRadius:8,overflow:"hidden",marginBottom:8,maxHeight:200,overflowY:"auto",boxShadow:"0 4px 16px #0000001a"}}>
      {toAddF.length===0&&<div style={{padding:"10px 14px",fontSize:13,color:"var(--text3)"}}>Sin resultados</div>}
      {toAddF.map(it=>(
        <div key={it.id} onClick={()=>add(it.id)}
          style={{padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid var(--border2)",display:"flex",justifyContent:"space-between",alignItems:"center"}}
          onMouseEnter={e=>e.currentTarget.style.background="var(--sr-hover)"}
          onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
          <div style={{minWidth:0,flex:1}}>
            <div style={{fontSize:13,fontWeight:600,color:"var(--sr-text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.nombre}</div>
            <div style={{fontSize:11,color:"var(--text2)"}}>{it.descripcion}</div>
          </div>
          <span style={{fontSize:12,color:"#16a34a",fontWeight:700,whiteSpace:"nowrap",marginLeft:10}}>+{getMax(it.id)} disp.</span>
        </div>
      ))}
    </div>}
    {!filtro&&toAdd.length>0&&<select className="input" onChange={e=>{add(e.target.value);e.target.value="";}} defaultValue="" style={{marginBottom:4}}>
      <option value="" disabled>— o selecciona de la lista —</option>
      {toAdd.map(it=><option key={it.id} value={it.id}>{it.nombre} — disponible: {getMax(it.id)}</option>)}
    </select>}
    {toAdd.length===0&&sinStock.length===0&&<div style={{fontSize:13,color:"var(--text3)",fontStyle:"italic"}}>Todos los equipos ya están asignados</div>}
    {sinStock.length>0&&<div style={{fontSize:12,color:"var(--text3)",marginTop:6}}>🔒 Sin stock: {sinStock.map(it=>it.nombre).join(", ")}</div>}
    <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:20}}>
      <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
      <button className="btn btn-primary" disabled={saving||equipos.some(eq=>eq.cantidad>getAvail(eq.inventario_id,event.id))} onClick={()=>onSave(event.id,equipos)}>{saving?"Guardando...":"Guardar equipos"}</button>
    </div>
  </div>;
}

createRoot(document.getElementById("root")).render(<App/>);
})();
</script>
</body>
</html>
